name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build archive
        run: |
          xcodebuild \
          -project beepserv-installer.xcodeproj \
          -scheme beepserv-installer \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          build

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/Release-iphoneos/beepserv-installer.app Payload/
          zip -r beepserv-installer.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: beepserv-installer.ipa
