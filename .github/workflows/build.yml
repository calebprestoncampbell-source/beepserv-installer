name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: chmod +x build.sh && ./build.sh

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: "*.ipa"