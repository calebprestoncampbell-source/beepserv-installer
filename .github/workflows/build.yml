name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: List schemes
        run: |
          xcodebuild -list -project beepserv-installer.xcodeproj

      - name: Build archive
        run: |
          xcodebuild \
          -project beepserv-installer.xcodeproj \
          -scheme BeepServ \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          build

      - name: Package IPA
        run: |
          mkdir Payload
          find build -name "*.app"
          cp -r $(find build -name "*.app" | head -n 1) Payload/
          zip -r beeperv-installer.ipa Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: beepserv-installer.ipa
