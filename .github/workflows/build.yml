name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Run build
        run: ./build.sh || true

      - name: Find IPA
        run: find . -name "*.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: |
            **/*.ipa
